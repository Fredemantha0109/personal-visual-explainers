<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト用サンプル</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 16px;
            line-height: 1.6;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
        }
        .point {
            background: #2a2a2a;
            border-left: 4px solid #4a9eff;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        .note {
            font-size: 11px;
            color: #999;
            margin-top: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🧪 テスト用です</h1>
    
    <div class="point">
        <strong>ご確認ください</strong><br>
        実際のテキストをお送りいただくと、簡易図解を素早く生成します。
    </div>
    
    <div class="point">
        <strong>対応内容</strong><br>
        ビジネス情報、概念、プロセス等、あらゆるテキストを図解化できます。
    </div>

    <div class="note">
        詳しい正式版は数十秒後にNotionの図解ログに追加されます
    </div>
</body>
</html>
